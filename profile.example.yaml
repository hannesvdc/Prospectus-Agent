# Seller profile — describe YOUR business and who you want to prospect.
# Copy this to `profile.yaml` and edit. Everything domain-specific lives here;
# the engine code is generic. (If profile.yaml is absent, this example is used.)

company:
  name: Open Numerics
  website: https://opennumerics.com
  # Short noun phrase describing what kind of company you are (used in prompts).
  positioning: a boutique scientific-computing consultancy
  # A brief trust/credibility line woven into every outreach email (optional).
  # Keep it about EXPERIENCE / track record — don't just re-list the offerings above.
  credibility: >
    Our team combines deep ties to academic research groups with years of
    hands-on experience delivering this kind of technical modelling work for
    companies in industry.
  # Optional gold-standard opener exemplar(s) for outreach emails. The drafter
  # ADAPTS these (never copies verbatim) to anchor the tone and structure of the
  # opening line. Add one or several — more entries give the voice more variety.
  # Omit the field entirely if you'd rather let the model write openers unguided.
  example_openers:
    - >
      I'm reaching out to introduce Open Numerics. We help technical teams decide
      where modeling, simulation, ML, or acceleration can make the biggest
      difference, then build the software and workflows to put those decisions
      into practice. That can include custom solvers, surrogate models, GPU/HPC
      workflows, and uncertainty-aware analysis tools.
  # Capability/feature areas named in the email SUBJECT line (short phrases). The
  # subject is framed around what YOU do, never a guess at the prospect's use cases.
  # Omit to let the model phrase the subject from the brief.
  capability_areas:
    - simulation
    - scientific ML/AI
    - uncertainty quantification
    - HPC/GPU acceleration
    - computational advisory
  # Business-specific framing dos/don'ts for the email body. This is where your
  # messaging lives (how to describe what you do, words to avoid) — the engine code
  # is otherwise business-agnostic. Each note is an instruction to the drafter.
  # Omit entirely to let the model write unguided from the brief + offerings.
  voice_notes:
    - >
      Convey that Open Numerics works at two levels: it advises on where modeling,
      simulation, ML, or acceleration can make the biggest difference, and then it
      builds the software and workflows itself. Keep this light.
    - >
      Phrase the build side as "then we build the tools" — never use stiff role-nouns
      like "implementers". Never read as advising the client to build it themselves.
    - >
      Never say "decide what to model" / "what to model" (condescending); "decide
      where [techniques] can make the biggest difference" is the right framing.
  # Fallback description, used only if the website can't be fetched.
  description: >
    Open Numerics provides specialist scientific-computing services: numerical
    simulation, uncertainty quantification, scientific machine learning, and
    GPU/HPC acceleration for engineering and research workloads.
  # What you sell — used to ground fit assessment and email drafting.
  offerings:
    - numerical simulation (CFD, FEA, multiphysics, custom solvers)
    - uncertainty quantification (UQ) and sensitivity analysis
    - scientific machine learning (physics-informed / surrogate models)
    - GPU acceleration of scientific and engineering compute
    - high-performance and parallel computing for modelling workloads

# OPTIONAL — per-business overrides of the .env tunables. Anything here wins over
# .env for THIS profile only (precedence: settings > .env > built-in default), so
# different businesses can run different cadences. Key names match the .env vars
# (case-insensitive). Omit the whole block to just use .env. Examples:
# settings:
#   target_company_count: 5      # how many companies to draft per run
#   max_per_sector: 3            # diversifier cap per sector
#   fit_score_threshold: 7       # min fit score (0-10) to qualify
#   max_discovery_calls: 3       # web-search rounds per run
#   max_company_size: mid        # startup|small|mid|large|enterprise

targeting:
  # Geographic focus for discovery (optional). Falls back to $TARGET_REGION in .env,
  # then "North America". Use "Global" (or "worldwide") for no geographic limit.
  region: North America
  # Who is a GOOD prospect — end-users with their own problems you could solve.
  ideal_customer: >
    Companies with their own engineering, R&D, or scientific problems that heavy
    simulation, uncertainty quantification, scientific ML, or GPU/HPC compute
    could solve — e.g. a turbine manufacturer, a battery startup, a drug developer.
  # Who to EXCLUDE — competitors who sell the same thing (not clients).
  exclude_competitors: >
    Companies whose own product or service is simulation / CFD / FEA / UQ /
    scientific-ML / HPC consulting or software.
  # Per-round search focus, rotated across discovery rounds (and by day).
  industry_angles:
    - aerospace, defense, automotive, and energy (turbomachinery, CFD, structures)
    - pharma, biotech, medical devices, and materials science (molecular/process modelling)
    - semiconductors, electronics, climate/geoscience, and quantitative finance
  # Household-name giants to steer away from (used as examples in the prompt).
  too_big_examples:
    - General Motors
    - Boeing
    - Pfizer
    - ExxonMobil

# OPTIONAL — override the sector taxonomy used by the diversifier. Omit to use
# the built-in default (engineering/science oriented). Map: bucket -> [keywords].
# sectors:
#   my_sector: [keyword one, keyword two]
